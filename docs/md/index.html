// ============ Theme ============
const THEME_STORAGE_KEY = 'docs-theme';
const systemTheme = window.matchMedia('(prefers-color-scheme: dark)');

function getActiveTheme() {
  return document.documentElement.dataset.theme || (systemTheme.matches ? 'dark' : 'light');
}

function syncThemeControl() {
  const activeTheme = getActiveTheme();
  const nextTheme = activeTheme === 'dark' ? 'light' : 'dark';
  const nextThemeLabel = nextTheme === 'dark' ? '深色' : '浅色';
  const toggle = document.getElementById('theme-toggle');

  document.getElementById('highlight-light').media = activeTheme === 'light' ? 'all' : 'not all';
  document.getElementById('highlight-dark').media = activeTheme === 'dark' ? 'all' : 'not all';
  document.getElementById('theme-icon').textContent = activeTheme === 'dark' ? '☀' : '☾';
  toggle.dataset.theme = activeTheme;
  toggle.setAttribute('aria-pressed', String(activeTheme === 'dark'));
  toggle.setAttribute('aria-label', `切换到${nextThemeLabel}主题`);
  toggle.title = `切换到${nextThemeLabel}主题`;
}

function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  try { localStorage.setItem(THEME_STORAGE_KEY, theme); } catch (e) {}
  syncThemeControl();
}

function highlightCodeBlocks(root) {
  const escapeHtml = value => value
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

  root.querySelectorAll('.md pre code').forEach(block => {
    const languageClass = Array.from(block.classList).find(name => name.startsWith('language-'));
    const language = languageClass ? languageClass.slice('language-'.length) : '';
    const source = block.textContent;
    let highlighted = escapeHtml(source);

    try {
      highlighted = language && hljs.getLanguage(language)
        ? hljs.highlight(source, { language, ignoreIllegals: true }).value
        : hljs.highlightAuto(source).value;
    } catch (e) {}

    block.innerHTML = highlighted;
    block.classList.add('hljs');
  });
}

    group.innerHTML = `

    layer.docs.forEach(doc => {
      const all = ALL_DOCS.find(d => d.slug === doc.slug);
      const a = document.createElement('a');
      a.className = 'doc-link';
      a.href = `#${doc.slug}`;
      a.dataset.slug = doc.slug;
      a.innerHTML = `<span class="order">${all.order}</span><span>${doc.title}</span>`;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        location.hash = doc.slug;
        // Close sidebar on mobile
        sidebar.classList.remove('open');
      });
      group.appendChild(a);
    });
    sidebar.appendChild(group);
  });
}

// ============ Load a doc ============
async function loadDoc(slug) {
  const render = document.getElementById('render');
  const doc = ALL_DOCS.find(d => d.slug === slug);
  if (!doc) {
    render.innerHTML = `<div class="error-box"><strong>404</strong> · 未找到文档:${slug}</div>`;
    return;
  }

  render.innerHTML = `<div class="loading"><div class="spinner"></div><span>加载 ${slug}.md ...</span></div>`;

  try {
    const resp = await fetch(`${slug}.md`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();

    // marked v12 returns string directly
    const html = marked.parse(text);
    const safe = DOMPurify.sanitize(html, {
      ADD_ATTR: ['id', 'target'],
    });

    render.innerHTML = `
      <div class="md-source">
        <span>📄 <strong>${slug}.md</strong> · ${doc.lines} 行 · L${doc.layer} ${doc.layerName}</span>
        <span>
          <a href="${slug}.md" target="_blank">原文件</a> ·
          <a href="https://github.com/e2b-dev/infra/blob/learn/brain/docs/md/${slug}.md" target="_blank">GitHub</a>
        </span>
      </div>
      <div class="md">${safe}</div>
    `;

    highlightCodeBlocks(render);

    // marked v12 no longer generates heading IDs; add GitHub-style slugs for TOC links.
    const headingSlugs = new Map();
    render.querySelectorAll('.md h1, .md h2, .md h3, .md h4').forEach(h => {
      const base = h.textContent
        .trim()
        .toLowerCase()
        .replace(/[^\p{L}\p{N}_\-\s]/gu, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-') || 'section';
      const duplicate = headingSlugs.get(base) || 0;
      headingSlugs.set(base, duplicate + 1);
      h.id = duplicate ? `${base}-${duplicate}` : base;

      const a = document.createElement('a');
      a.className = 'anchor';
      a.href = `#${h.id}`;
      a.textContent = '#';
      a.dataset.anchor = '1';
      h.appendChild(a);
    });

    // Rewrite internal .md links to use the SPA router
    render.querySelectorAll('.md a').forEach(a => {
      const href = a.getAttribute('href');
      if (!href) return;
      if (href.startsWith('#')) {
        const anchor = href.slice(1);
        if (!anchor) return;
        a.href = `#${slug}/${anchor}`;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          location.hash = `${slug}/${anchor}`;
        });
        return;
      }
      // Skip external and absolute paths
      if (/^(https?:|mailto:|\/)/.test(href)) return;
      // Match ./foo.md, ../foo.md, foo.md
      const m = href.match(/^(?:\.?\/|(?:\.\.\/)+)?([a-z0-9-]+)\.md(?:#.*)?$/i);
      if (m && ALL_DOCS.find(d => d.slug === m[1])) {
        const hash = m[1];
        const frag = href.split('#')[1];
        a.href = '#' + hash + (frag ? `/${frag}` : '');
        a.addEventListener('click', (e) => {
          e.preventDefault();
          location.hash = '#' + hash + (frag ? `/${frag}` : '');
        });
      }
    });

    // Update top bar
    document.getElementById('breadcrumb').innerHTML =
      `<a href="#" data-route="">docs/md</a><span class="sep">/</span><span class="current">${slug}.md</span>`;
    document.getElementById('open-raw').href = `${slug}.md`;
    document.getElementById('open-raw').style.display = '';
    document.getElementById('open-github').href =
      `https://github.com/e2b-dev/infra/blob/learn/brain/docs/md/${slug}.md`;
    document.getElementById('open-github').style.display = '';

    // Scroll to top (or to anchor)
    const [, encodedAnchorId] = location.hash.split('/');
    const anchorId = encodedAnchorId ? decodeURIComponent(encodedAnchorId) : '';
    if (anchorId) {
      const el = document.getElementById(anchorId);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }
    }
    document.querySelector('main').scrollTop = 0;
  } catch (err) {
    render.innerHTML = `
      <div class="error-box">
        <strong>加载失败</strong> · ${err.message}<br><br>
        如果你是用 <code>file://</code> 直接打开本文件,fetch 会被浏览器 CORS 拦截。
        请用 HTTP server 打开,例如在仓库根目录执行:<br>
        <code>python3 -m http.server 8000</code><br>
        然后访问 <a href="http://localhost:8000/docs/md/">http://localhost:8000/docs/md/</a>
      </div>
    `;
  }
}

// ============ Router ============
function route() {
  const hash = location.hash.slice(1);
  const [slug] = hash.split('/');
  // Highlight active link in sidebar
  document.querySelectorAll('.doc-link').forEach(a => {
    a.classList.toggle('active', a.dataset.slug === slug);
  });

  if (!hash) {
    buildHome();
    return;
  }
  loadDoc(slug);
}
